<div id="tab-history" class="tab-panel" style="display:none">
  <div class="panel-header">
    <h2><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> Query History</h2>
    <p><span id="historyCount">{{ history|length }}</span> queries executed this session</p>
  </div>
  <div class="search-bar">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" x2="16.65" y1="21" y2="16.65"/></svg>
    <input type="text" id="historySearch" placeholder="Search history..." oninput="filterHistory()"/>
  </div>
  <div id="historyList" class="item-list"></div>
</div>
