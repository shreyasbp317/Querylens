<div id="tab-schema" class="tab-panel schema-panel" style="display:none">
  <div class="schema-sidebar">
    <div class="panel-header">
      <h2><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="2"><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></svg> Schema Explorer</h2>
      <p>{{ schemas|length }} tables introspected</p>
    </div>
    <div class="search-bar">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" x2="16.65" y1="21" y2="16.65"/></svg>
      <input type="text" id="schemaSearch" placeholder="Search tables..." oninput="filterSchemas()"/>
    </div>
    <div id="schemaList" class="schema-list"></div>
  </div>
  <div id="schemaDetail" class="schema-detail">
    <div class="empty-state">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#374151" stroke-width="2"><rect width="7" height="7" x="3" y="3" rx="1"/><rect width="7" height="7" x="14" y="3" rx="1"/><rect width="7" height="7" x="14" y="14" rx="1"/><rect width="7" height="7" x="3" y="14" rx="1"/></svg>
      <p>Select a table to view its schema</p>
    </div>
  </div>
</div>
