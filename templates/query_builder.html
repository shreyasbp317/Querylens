<div id="tab-query" class="tab-panel">
  <div class="panel-header"><h2><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#a78bfa" stroke-width="2"><path d="M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.581a.5.5 0 0 1 0 .964L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z"/></svg> Natural Language Query Builder</h2><p>Ask a question in plain English — powered by OpenAI GPT-4</p></div>
  <div class="panel-body">
    <form id="queryForm" class="query-form">
      <div class="input-wrap">
        <textarea id="queryInput" rows="3" placeholder="e.g. Show me all active users who placed more than 5 orders in the last 90 days..."></textarea>
        <button type="submit" id="queryBtn" class="send-btn" disabled><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m22 2-7 20-4-9-9-4z"/><path d="M22 2 11 13"/></svg></button>
      </div>
      <p class="hint">Press <kbd>Ctrl+Enter</kbd> to run</p>
    </form>
    <div id="examplePrompts" class="examples"><p class="examples-label">▾ Try an example</p><div class="example-chips">
      <button class="chip" onclick="setExample(this)">Show me top 10 best-selling products by revenue</button>
      <button class="chip" onclick="setExample(this)">Monthly revenue breakdown for this year</button>
      <button class="chip" onclick="setExample(this)">Users who signed up in the last 30 days</button>
      <button class="chip" onclick="setExample(this)">Top 20 customers by lifetime value</button>
    </div></div>
    <div id="loadingState" class="loading-box" style="display:none">
      <div class="loading-row"><div class="spinner"></div><span>Generating SQL with GPT-4...</span></div>
      <div class="bounce-dots"><div class="dot" style="animation-delay:0s"></div><div class="dot" style="animation-delay:0.2s"></div><div class="dot" style="animation-delay:0.4s"></div></div>
      <p class="loading-sub">Introspecting schema → building query → executing against PostgreSQL</p>
    </div>
    <div id="sqlResult" style="display:none">
      <div class="sql-card">
        <div class="sql-header">
          <div class="sql-dots"><div class="dot-r"></div><div class="dot-y"></div><div class="dot-g"></div><span class="sql-filename">generated_query.sql</span></div>
          <div class="sql-actions">
            <span id="sqlMeta" class="sql-meta"></span>
            <button onclick="copySQL()" class="action-btn" id="copyBtn">📋 Copy</button>
            <button onclick="openSaveModal()" class="action-btn">🔖 Save</button>
            <button onclick="resetQuery()" class="action-btn">↺ Reset</button>
          </div>
        </div>
        <pre class="sql-code"><code id="sqlCode"></code></pre>
      </div>
    </div>
    <div id="resultsTable" style="display:none"></div>
  </div>
</div>
<div id="saveModal" class="modal-overlay" style="display:none">
  <div class="modal">
    <h3>Save Query</h3>
    <label>Query name *</label>
    <input id="saveName" placeholder="e.g. Monthly Revenue Report"/>
    <label>Tags (comma-separated)</label>
    <input id="saveTags" placeholder="e.g. revenue, reporting, monthly"/>
    <div class="modal-actions">
      <button onclick="closeSaveModal()" class="btn-cancel">Cancel</button>
      <button onclick="saveQuery()" class="btn-save">Save Query</button>
    </div>
  </div>
</div>
